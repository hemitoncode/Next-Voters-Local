name: Build and Deploy to Azure Container Apps
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
env:
  ACR_NAME: nvlocal
  ACR_LOGIN_SERVER: nvlocal.azurecr.io
  IMAGE_NAME: next-voters-local
  RESOURCE_GROUP: nextvoters
  CONTAINER_APP_JOB: next-voters-run
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push container image to ACR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Update Container App Job image
        run: |
          az containerapp job update \
            --name ${{ env.CONTAINER_APP_JOB }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
