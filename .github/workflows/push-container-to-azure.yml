name: Push Container Image to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    if: github.event.head_commit.message == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      AZURE_CONTAINER_REGISTRY: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
      IMAGE_NAME: next-voters-local
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sign in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate registry configuration
        run: |
          if [ -z "${AZURE_CONTAINER_REGISTRY}" ]; then
            echo "Missing AZURE_CONTAINER_REGISTRY secret." >&2
            exit 1
          fi

      - name: Resolve registry login server
        id: registry
        run: |
          LOGIN_SERVER=$(az acr show --name "$AZURE_CONTAINER_REGISTRY" --query loginServer -o tsv)
          if [ -z "$LOGIN_SERVER" ]; then
            echo "Unable to resolve login server for $AZURE_CONTAINER_REGISTRY" >&2
            exit 1
          fi
          echo "login_server=$LOGIN_SERVER" >> "$GITHUB_OUTPUT"

      - name: Log in to Azure Container Registry
        run: az acr login --name "$AZURE_CONTAINER_REGISTRY"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.registry.outputs.login_server }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ steps.registry.outputs.login_server }}/${{ env.IMAGE_NAME }}:latest
